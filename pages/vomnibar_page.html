<!DOCTYPE html>
<html>
  <head>
    <title>Vomnibar</title>
    <meta name="color-scheme" content="light dark">
    <meta charset="UTF-8">
    <script type="module" src="vomnibar_page.js"></script>
    <link rel="stylesheet" type="text/css" href="../content_scripts/vimium.css" />
    <link rel="stylesheet" type="text/css" href="vomnibar_page.css" />
  </head>
  <body>
    <div id="vomnibar" role="application" aria-label="Vomnibar">
      <div id="vomnibar-search-area" role="search">
        <input 
          type="text" 
          autocomplete="off"
          aria-label="Search or enter URL"
          aria-autocomplete="list"
          aria-controls="vomnibar-results"
          placeholder="Enter search or URL">
      </div>
      <ul id="vomnibar-results" role="listbox" aria-label="Search results"></ul>
    </div>

    <!-- Live region for announcing result count -->
    <div id="a11y-announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
  </body>
</html>
